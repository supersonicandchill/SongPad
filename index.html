
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🎸 SongPad</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0b0b12;
  --surface:#14141f;
  --card:#1c1c2e;
  --card2:#201e35;
  --border:#2a2a42;
  --gold:#F0B429;
  --gold2:#f7c93d;
  --orange:#E8763A;
  --teal:#2C8C7C;
  --teal2:#37a896;
  --text:#ede9e0;
  --muted:#666;
  --muted2:#888;
  --danger:#c0392b;
  --purple:#7c5cbf;
}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;overflow-x:hidden}

/* noise overlay */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:.5;pointer-events:none;z-index:0}

/* HEADER */
.header{background:linear-gradient(135deg,#0f0f1e 0%,#181828 100%);border-bottom:2px solid var(--gold);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 4px 30px rgba(0,0,0,.5)}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.9rem;letter-spacing:2px;color:var(--gold);text-shadow:0 0 30px rgba(240,180,41,.5),0 0 60px rgba(240,180,41,.2);line-height:1}
.logo span{color:var(--orange)}
.logo sub{font-size:.55rem;color:var(--muted2);letter-spacing:1px;font-weight:600;vertical-align:middle;margin-left:4px}
.hbtns{display:flex;gap:7px;align-items:center}

/* BUTTONS */
.btn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.92rem;letter-spacing:.5px;border:none;border-radius:8px;padding:8px 13px;cursor:pointer;transition:all .15s;line-height:1}
.btn-gold{background:var(--gold);color:#111}.btn-gold:hover{background:var(--gold2);transform:translateY(-1px)}
.btn-ol{background:transparent;color:var(--gold);border:1.5px solid rgba(240,180,41,.5)}.btn-ol:hover{background:rgba(240,180,41,.08);border-color:var(--gold)}
.btn-teal{background:var(--teal);color:#fff}.btn-teal:hover{background:var(--teal2)}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{background:#e74c3c}
.btn-ghost{background:transparent;color:var(--muted2);border:1.5px solid var(--border)}.btn-ghost:hover{color:var(--text);border-color:var(--muted)}
.btn-sm{padding:7px 10px;font-size:.82rem}
.btn-xs{padding:5px 9px;font-size:.78rem}

/* RANDOM BANNER */
.rand-wrap{padding:10px 12px 0}
.rand-banner{background:linear-gradient(100deg,#13102a,#1a1635);border:1.5px solid var(--orange);border-radius:12px;padding:13px 14px;display:flex;align-items:center;gap:11px;animation:slideIn .25s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.rand-icon{font-size:1.8rem;flex-shrink:0}
.rand-body{flex:1;min-width:0}
.rand-lbl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.72rem;color:var(--orange);letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.rand-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1.15rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rand-hook{font-size:.83rem;color:var(--gold);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rand-acts{display:flex;gap:6px;flex-shrink:0}

/* SEARCH / FILTER */
.search-bar{padding:10px 12px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:8px;position:sticky;top:60px;z-index:90}
.search-wrap{flex:1;min-width:160px;position:relative}
.search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:.9rem;pointer-events:none}
.search-input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:8px 11px 8px 30px;color:var(--text);font-family:'Barlow',sans-serif;font-size:.92rem;outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--gold)}
.search-input::placeholder{color:var(--muted)}
.chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.77rem;padding:4px 10px;border-radius:20px;border:1.5px solid var(--border);cursor:pointer;transition:all .15s;color:var(--muted);background:transparent;white-space:nowrap}
.chip.on{background:var(--gold);color:#111;border-color:var(--gold)}
.chip:hover:not(.on){border-color:rgba(240,180,41,.5);color:var(--gold2)}

/* COUNT */
.count-bar{padding:7px 16px 2px;font-family:'Barlow Condensed',sans-serif;font-size:.82rem;color:var(--muted);display:flex;align-items:center;gap:8px}
.count-num{color:var(--gold);font-weight:700}

/* GRID */
.grid{padding:10px 12px 6px;display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:11px;position:relative;z-index:1}
@media(max-width:450px){.grid{grid-template-columns:1fr;padding:8px}}

/* CARD */
.card{background:var(--card);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:transform .18s,border-color .18s,box-shadow .18s;position:relative}
.card:hover{transform:translateY(-3px);border-color:rgba(240,180,41,.4);box-shadow:0 8px 30px rgba(0,0,0,.4)}
.card.fav{border-color:rgba(240,180,41,.6)}
.card.fav::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(240,180,41,.04),transparent);pointer-events:none}
.caccent{height:4px;width:100%;flex-shrink:0}
.cbody{padding:12px 13px 11px}
.ctop{display:flex;align-items:flex-start;justify-content:space-between;gap:7px;margin-bottom:5px}
.ctitle{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.1rem;line-height:1.25;color:var(--text)}
.ctitle.empty{color:var(--muted)}
.starbtn{background:none;border:none;font-size:1.15rem;cursor:pointer;padding:2px;flex-shrink:0;opacity:.28;transition:opacity .15s,transform .15s;line-height:1}
.starbtn:hover{opacity:.7;transform:scale(1.15)}
.starbtn.on{opacity:1}
.chook{font-size:.86rem;color:var(--gold);font-style:italic;margin-bottom:7px;line-height:1.35;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.cmeta{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:7px}
.tag{font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:.74rem;padding:2px 8px;border-radius:20px}
.t-mood{background:rgba(44,140,124,.2);color:#5bd5c2;border:1px solid rgba(44,140,124,.3)}
.t-genre{background:rgba(232,118,58,.16);color:#f0935a;border:1px solid rgba(232,118,58,.28)}
.t-key{background:rgba(240,180,41,.12);color:var(--gold);border:1px solid rgba(240,180,41,.25)}
.cnotes{font-size:.8rem;color:var(--muted2);line-height:1.45;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.cdate{font-size:.69rem;color:#3e3e5a;margin-top:8px;font-family:'Barlow Condensed',sans-serif;letter-spacing:.3px}

/* EMPTY */
.empty{text-align:center;padding:70px 24px 40px;color:var(--muted);position:relative;z-index:1}
.empty-icon{font-size:3.8rem;margin-bottom:14px;filter:grayscale(.5)}
.empty-ttl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.35rem;color:var(--muted2);margin-bottom:7px}
.empty-sub{font-size:.87rem;line-height:1.5}

/* OVERLAY / MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(3px)}
@media(min-width:560px){.overlay{align-items:center}}
.modal{background:var(--surface);border-radius:18px 18px 0 0;width:100%;max-width:530px;max-height:94vh;overflow-y:auto;padding:18px 16px 24px;border:1.5px solid var(--border);border-bottom:none;animation:slideUp .22s ease}
@media(min-width:560px){.modal{border-radius:16px;border-bottom:1.5px solid var(--border);animation:fadeIn .18s ease}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.mhandle{width:42px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
@media(min-width:560px){.mhandle{display:none}}
.mtr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.mttl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.22rem;color:var(--gold)}
.mlbl{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.75rem;letter-spacing:.6px;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.minput,.mtarea,.mselect{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--text);font-family:'Barlow',sans-serif;font-size:.92rem;outline:none;margin-bottom:12px;transition:border-color .15s}
.minput:focus,.mtarea:focus,.mselect:focus{border-color:var(--gold);background:var(--card2)}
.minput::placeholder,.mtarea::placeholder{color:var(--muted)}
.mtarea{min-height:90px;resize:vertical;line-height:1.5}
.mselect option{background:var(--card);color:var(--text)}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:11px}
@media(max-width:380px){.mrow{grid-template-columns:1fr}}
.mactions{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;align-items:center}
.mactions-right{margin-left:auto}
.fav-toggle{display:flex;align-items:center;gap:9px;cursor:pointer;margin-bottom:13px;padding:8px 10px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);transition:border-color .15s}
.fav-toggle:hover{border-color:var(--gold)}
.fav-toggle.on{border-color:rgba(240,180,41,.4);background:rgba(240,180,41,.06)}
.fav-star{font-size:1.3rem;transition:opacity .15s}
.fav-lbl{font-size:.85rem;color:var(--muted2)}

/* IO MODAL */
.io-ta{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:10px 11px;color:var(--text);font-family:'Courier New',monospace;font-size:.75rem;min-height:110px;resize:vertical;outline:none;margin:8px 0;line-height:1.5}
.io-ta:focus{border-color:var(--gold)}
.io-msg{font-size:.81rem;margin-top:8px;padding:7px 10px;border-radius:6px}
.io-msg.ok{background:rgba(44,140,124,.15);color:var(--teal2);border:1px solid rgba(44,140,124,.25)}
.io-msg.err{background:rgba(192,57,43,.15);color:#e74c3c;border:1px solid rgba(192,57,43,.25)}

/* DISCLAIMER */
.disclaimer{text-align:center;font-size:.73rem;color:#2e2e48;padding:16px 14px 28px;line-height:1.7;border-top:1px solid #131320;margin-top:16px;position:relative;z-index:1}
.disclaimer strong{color:#444}
.disclaimer .disc-icon{font-size:1.1rem;display:block;margin-bottom:4px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useCallback} = React;

const MOODS = ['Hype','Chill','Dark','Hopeful','Romantic','Melancholy','Angry','Playful','Spiritual','Nostalgic'];
const GENRES = ['Pop','Hip-Hop','R&B','Rock','Country','Gospel','Folk','EDM','Trap','Jazz','Soul','Indie','Alt','Other'];
const ACCENTS = ['#E8763A','#F0B429','#2C8C7C','#7c5cbf','#c0392b','#2980b9','#27ae60','#e91e8c','#16a085','#d35400'];

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function fmtDate(ts) { return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'}); }
function accentFor(id) {
  let n = 0;
  for (let i = 0; i < id.length; i++) n = (n * 31 + id.charCodeAt(i)) & 0xffff;
  return ACCENTS[n % ACCENTS.length];
}
const blankIdea = () => ({id:uid(),title:'',hook:'',mood:'',key:'',genre:'',notes:'',fav:false,ts:Date.now()});

function App() {
  const [ideas, setIdeas] = useState(() => {
    try { return JSON.parse(localStorage.getItem('songpad') || '[]'); } catch { return []; }
  });
  const [search, setSearch] = useState('');
  const [fMood, setFMood] = useState('');
  const [fGenre, setFGenre] = useState('');
  const [favOnly, setFavOnly] = useState(false);
  const [editing, setEditing] = useState(null);
  const [isNew, setIsNew] = useState(false);
  const [random, setRandom] = useState(null);
  const [showIO, setShowIO] = useState(false);
  const [ioMode, setIOMode] = useState('export');
  const [ioText, setIOText] = useState('');
  const [ioMsg, setIOMsg] = useState(null);

  useEffect(() => { localStorage.setItem('songpad', JSON.stringify(ideas)); }, [ideas]);

  const save = useCallback(card => {
    setIdeas(prev => {
      const exists = prev.find(i => i.id === card.id);
      return exists ? prev.map(i => i.id === card.id ? card : i) : [card, ...prev];
    });
    setEditing(null); setIsNew(false);
  }, []);

  const del = useCallback(id => {
    setIdeas(prev => prev.filter(i => i.id !== id));
    setEditing(null); setIsNew(false);
  }, []);

  const toggleFav = useCallback((e, id) => {
    e.stopPropagation();
    setIdeas(prev => prev.map(i => i.id === id ? {...i, fav: !i.fav} : i));
  }, []);

  const doRandom = () => {
    if (!ideas.length) return;
    const unfaved = ideas.filter(i => !i.fav);
    const pool = unfaved.length ? unfaved : ideas;
    setRandom(pool[Math.floor(Math.random() * pool.length)]);
  };

  const filtered = [...ideas]
    .filter(i => {
      if (favOnly && !i.fav) return false;
      if (fMood && i.mood !== fMood) return false;
      if (fGenre && i.genre !== fGenre) return false;
      const q = search.toLowerCase().trim();
      return !q || (i.title + i.hook + i.notes + i.mood + i.genre + i.key).toLowerCase().includes(q);
    })
    .sort((a, b) => b.ts - a.ts);

  const openExport = () => {
    setIOMode('export');
    setIOText(JSON.stringify(ideas, null, 2));
    setIOMsg(null); setShowIO(true);
  };
  const openImport = () => { setIOMode('import'); setIOText(''); setIOMsg(null); setShowIO(true); };

  const doImport = () => {
    try {
      const arr = JSON.parse(ioText);
      if (!Array.isArray(arr)) throw new Error();
      const valid = arr.filter(n => n && n.id && typeof n.title !== 'undefined');
      setIdeas(prev => {
        const ids = new Set(prev.map(i => i.id));
        return [...prev, ...valid.filter(n => !ids.has(n.id))];
      });
      setIOMsg({type:'ok', text:`✅ Imported ${valid.length} idea(s). Duplicates skipped.`});
    } catch {
      setIOMsg({type:'err', text:'❌ Invalid JSON — check your data and try again.'});
    }
  };

  const hasFilter = fMood || fGenre || favOnly || search.trim();

  return (
    <div>
      <header className="header">
        <div className="logo">🎸 Song<span>Pad</span><sub>ideas</sub></div>
        <div className="hbtns">
          <button className="btn btn-ol btn-sm" title="Resurface a forgotten idea" onClick={doRandom}>🎲</button>
          <button className="btn btn-ol btn-sm" title="Import ideas" onClick={openImport}>⬆️</button>
          <button className="btn btn-ol btn-sm" title="Export ideas" onClick={openExport}>⬇️</button>
          <button className="btn btn-gold btn-sm" onClick={() => { setIsNew(true); setEditing(blankIdea()); }}>＋ New</button>
        </div>
      </header>

      {random && (
        <div className="rand-wrap">
          <div className="rand-banner">
            <div className="rand-icon">🎲</div>
            <div className="rand-body">
              <div className="rand-lbl">Forgotten Idea</div>
              <div className="rand-title">{random.title || 'Untitled'}</div>
              {random.hook && <div className="rand-hook">"{random.hook}"</div>}
            </div>
            <div className="rand-acts">
              <button className="btn btn-ol btn-xs" onClick={() => { setEditing({...random}); setIsNew(false); setRandom(null); }}>Open</button>
              <button className="btn btn-ghost btn-xs" onClick={() => setRandom(null)}>✕</button>
            </div>
          </div>
        </div>
      )}

      <div className="search-bar">
        <div className="search-wrap">
          <span className="search-ico">🔍</span>
          <input className="search-input" placeholder="Search title, hook, notes…" value={search} onChange={e => setSearch(e.target.value)}/>
        </div>
        <div className="chips">
          <span className={`chip${favOnly ? ' on' : ''}`} onClick={() => setFavOnly(f => !f)}>⭐ Favs</span>
          {MOODS.map(m => (
            <span key={m} className={`chip${fMood === m ? ' on' : ''}`} onClick={() => setFMood(f => f === m ? '' : m)}>{m}</span>
          ))}
        </div>
        <div className="chips">
          {GENRES.map(g => (
            <span key={g} className={`chip${fGenre === g ? ' on' : ''}`} onClick={() => setFGenre(f => f === g ? '' : g)}>{g}</span>
          ))}
        </div>
      </div>

      <div className="count-bar">
        <span className="count-num">{filtered.length}</span>
        <span>idea{filtered.length !== 1 ? 's' : ''}{hasFilter ? ' · filtered' : ''}</span>
        {hasFilter && (
          <span style={{marginLeft:'auto',cursor:'pointer',color:'var(--orange)',fontSize:'.78rem',fontFamily:'Barlow Condensed',fontWeight:700}}
            onClick={() => { setSearch(''); setFMood(''); setFGenre(''); setFavOnly(false); }}>
            Clear ✕
          </span>
        )}
      </div>

      {filtered.length === 0 ? (
        <div className="empty">
          <div className="empty-icon">{ideas.length === 0 ? '🎵' : '🔍'}</div>
          <div className="empty-ttl">{ideas.length === 0 ? 'No ideas yet' : 'Nothing matches'}</div>
          <div className="empty-sub">
            {ideas.length === 0
              ? <>Tap <strong style={{color:'var(--gold)'}}>＋ New</strong> to capture your first spark.</>
              : 'Try clearing the filter or adjusting your search.'}
          </div>
        </div>
      ) : (
        <div className="grid">
          {filtered.map(idea => (
            <div key={idea.id} className={`card${idea.fav ? ' fav' : ''}`} onClick={() => { setEditing({...idea}); setIsNew(false); }}>
              <div className="caccent" style={{background: accentFor(idea.id)}}/>
              <div className="cbody">
                <div className="ctop">
                  <div className={`ctitle${!idea.title ? ' empty' : ''}`}>{idea.title || 'Untitled'}</div>
                  <button className={`starbtn${idea.fav ? ' on' : ''}`} onClick={e => toggleFav(e, idea.id)} title={idea.fav ? 'Unfavorite' : 'Favorite'}>⭐</button>
                </div>
                {idea.hook && <div className="chook">"{idea.hook}"</div>}
                <div className="cmeta">
                  {idea.mood && <span className="tag t-mood">{idea.mood}</span>}
                  {idea.genre && <span className="tag t-genre">{idea.genre}</span>}
                  {idea.key && <span className="tag t-key">🎵 {idea.key}</span>}
                </div>
                {idea.notes && <div className="cnotes">{idea.notes}</div>}
                <div className="cdate">{fmtDate(idea.ts)}</div>
              </div>
            </div>
          ))}
        </div>
      )}

      {editing && (
        <EditModal
          card={editing}
          isNew={isNew}
          onSave={save}
          onDelete={del}
          onClose={() => { setEditing(null); setIsNew(false); }}
        />
      )}

      {showIO && (
        <div className="overlay" onClick={() => setShowIO(false)}>
          <div className="modal" style={{maxWidth:430}} onClick={e => e.stopPropagation()}>
            <div className="mhandle"/>
            <div className="mtr">
              <div className="mttl">{ioMode === 'export' ? '⬇️ Export Ideas' : '⬆️ Import Ideas'}</div>
              <button className="btn btn-ghost btn-sm" onClick={() => setShowIO(false)}>✕</button>
            </div>
            {ioMode === 'export' ? (
              <>
                <p style={{fontSize:'.83rem',color:'var(--muted2)',marginBottom:4,lineHeight:1.5}}>Copy this JSON and save it somewhere safe — a notes app, Google Drive, email yourself.</p>
                <textarea className="io-ta" readOnly value={ioText} onClick={e => e.target.select()}/>
                <button className="btn btn-gold" style={{width:'100%'}} onClick={() => { navigator.clipboard.writeText(ioText); setIOMsg({type:'ok',text:'✅ Copied to clipboard!'}); }}>
                  Copy to Clipboard
                </button>
                {ioMsg && <div className={`io-msg ${ioMsg.type}`}>{ioMsg.text}</div>}
              </>
            ) : (
              <>
                <p style={{fontSize:'.83rem',color:'var(--muted2)',marginBottom:4,lineHeight:1.5}}>Paste your exported JSON below. New ideas will be merged — existing IDs won't be overwritten.</p>
                <textarea className="io-ta" value={ioText} onChange={e => setIOText(e.target.value)} placeholder="Paste exported JSON here…"/>
                <button className="btn btn-teal" style={{width:'100%'}} onClick={doImport}>Import Ideas</button>
                {ioMsg && <div className={`io-msg ${ioMsg.type}`}>{ioMsg.text}</div>}
              </>
            )}
          </div>
        </div>
      )}

      <div className="disclaimer">
        <span className="disc-icon">💾</span>
        <strong>Always export and save your ideas regularly!</strong><br/>
        SongPad stores data in your browser's localStorage — it can be lost if you clear your browser data or switch devices.<br/>
        Use the <strong>⬇️ Export</strong> button to back up your ideas as a JSON file you can reimport anytime.
      </div>
    </div>
  );
}

function EditModal({card, isNew, onSave, onDelete, onClose}) {
  const [form, setForm] = useState({...card});
  const set = (k, v) => setForm(f => ({...f, [k]: v}));

  const handleSave = () => {
    if (!form.title.trim() && !form.hook.trim()) {
      alert('Add at least a title or a hook line before saving.');
      return;
    }
    onSave({...form, ts: isNew ? Date.now() : form.ts});
  };

  const handleDelete = () => {
    if (window.confirm('Delete this idea permanently?')) onDelete(form.id);
  };

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <div className="mhandle"/>
        <div className="mtr">
          <div className="mttl">{isNew ? '✨ New Idea' : '✏️ Edit Idea'}</div>
          <button className="btn btn-ghost btn-sm" onClick={onClose}>✕</button>
        </div>

        <div className="mlbl">Title</div>
        <input className="minput" placeholder="Working title or song name…" value={form.title} onChange={e => set('title', e.target.value)}/>

        <div className="mlbl">Hook / First Line</div>
        <input className="minput" placeholder='"That line stuck in your head…"' value={form.hook} onChange={e => set('hook', e.target.value)}/>

        <div className="mrow">
          <div>
            <div className="mlbl">Mood</div>
            <select className="mselect" value={form.mood} onChange={e => set('mood', e.target.value)}>
              <option value="">— Pick mood —</option>
              {MOODS.map(m => <option key={m}>{m}</option>)}
            </select>
          </div>
          <div>
            <div className="mlbl">Genre</div>
            <select className="mselect" value={form.genre} onChange={e => set('genre', e.target.value)}>
              <option value="">— Pick genre —</option>
              {GENRES.map(g => <option key={g}>{g}</option>)}
            </select>
          </div>
        </div>

        <div className="mlbl">Key / Tempo Feel</div>
        <input className="minput" placeholder="e.g. G major · slow burn · 90 BPM feel · minor key" value={form.key} onChange={e => set('key', e.target.value)}/>

        <div className="mlbl">Notes</div>
        <textarea className="mtarea" placeholder="Verse ideas, chord progression, structure, artist references, anything…" value={form.notes} onChange={e => set('notes', e.target.value)}/>

        <div className={`fav-toggle${form.fav ? ' on' : ''}`} onClick={() => set('fav', !form.fav)}>
          <span className="fav-star" style={{opacity: form.fav ? 1 : 0.3}}>⭐</span>
          <span className="fav-lbl">{form.fav ? 'Favorited — skipped by 🎲 Random' : 'Mark as favorite'}</span>
        </div>

        <div className="mactions">
          <button className="btn btn-gold" onClick={handleSave}>💾 Save</button>
          <button className="btn btn-ghost" onClick={onClose}>Cancel</button>
          {!isNew && (
            <button className="btn btn-danger mactions-right" onClick={handleDelete}>🗑 Delete</button>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
